[alembic]
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://khatabox:khatabox123@localhost:5432/khatabox
# Override with: DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/dbname alembic upgrade head

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
