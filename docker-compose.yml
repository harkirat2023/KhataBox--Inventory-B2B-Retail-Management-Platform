services:
  postgres:
    image: postgres:16-alpine
    container_name: khatabox-postgres
    environment:
      POSTGRES_DB: khatabox
      POSTGRES_USER: khatabox
      POSTGRES_PASSWORD: khatabox123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khatabox -d khatabox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: khatabox-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
